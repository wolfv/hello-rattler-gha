name: Build conda package

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target.platform }})
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: ubuntu-latest,  platform: linux-64   }
          - { os: macos-latest,   platform: osx-arm64  }
          - { os: windows-latest, platform: win-64     }

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.0
        with:
          pixi-version: latest
          run-install: false

      - name: Build conda package
        run: pixi build --output-dir ./output

      # Each platform uploads its own artifact named `hello-rattler-<platform>`.
      # Rattler resolves the correct one automatically when you use the
      # `{subdir}` placeholder in a gha:// URL:
      #
      #   gha://wolfv/hello-rattler-gha/runs/<run-id>/hello-rattler-{subdir}
      #
      # Rattler substitutes {subdir} with the current platform (e.g. linux-64,
      # osx-arm64, win-64) at resolve time, so callers don't need to know or
      # hard-code the platform.
      - name: Upload conda package
        uses: actions/upload-artifact@v4
        with:
          name: hello-rattler-${{ matrix.target.platform }}
          path: ./output/**/*.conda
          if-no-files-found: error
